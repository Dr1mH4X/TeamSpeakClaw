name: build

on:
  push:
    tags:
      - "v*"
    paths:
      - ".github/workflows/build.yml"
      - "src/**"
    branches:
      - "main"
      - "master"
  pull_request:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

env:
  BIN_NAME: teamspeakclaw
  PROJECT_NAME: TeamSpeakClaw

jobs:
  meta:
    name: Meta
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is-release: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
            TAG="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.platform }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_suffix: .exe
          - platform: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_suffix: ""
          - platform: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version in Cargo.toml
        if: needs.meta.outputs.is-release == 'true'
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          else
            sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Build
        if: runner.os != 'Linux'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          SRC="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.bin_suffix }}"
          DEST="dist/${{ env.PROJECT_NAME }}-v${{ needs.meta.outputs.version }}-${{ matrix.platform }}${{ matrix.bin_suffix }}"

          if [ -f "$SRC" ]; then
            cp "$SRC" "$DEST"
            echo "Artifact prepared: $DEST"
          else
            echo "Error: Binary not found at $SRC"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: dist/*

  changelog:
    name: Generate changelog
    needs: meta
    if: needs.meta.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md

  release:
    name: Create Release
    if: needs.meta.outputs.is-release == 'true'
    needs: [meta, build, changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Release ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
