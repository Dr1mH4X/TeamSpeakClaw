name: build

env:
  BIN_NAME: teamspeakclaw
  PROJECT_NAME: TeamSpeakClaw
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
    paths:
      - ".github/workflows/build.yml"
      - "src/**"
    branches:
      - "main"
      - "master"
  pull_request:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

jobs:
  meta:
    name: Meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is-release: ${{ startsWith(github.ref, 'refs/tags/v') }}
      is-prerelease: ${{ startsWith(github.ref, 'refs/tags/v') && contains(steps.version.outputs.tag, '-beta') }}
      is-stable-release: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(steps.version.outputs.tag, '-beta') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
            TAG="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.platform }}
    needs: meta
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_suffix: .exe
          - platform: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_suffix: ""
          - platform: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version in Cargo.toml
        if: needs.meta.outputs.is-release == 'true'
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          else
            sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool

      - name: Build
        if: runner.os != 'Linux'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libopus-dev

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          STAGING="staging"

          mkdir -p "$STAGING/config"

          SRC="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.bin_suffix }}"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$STAGING/"
          else
            echo "Error: Binary not found at $SRC"
            exit 1
          fi
          cp examples/config/settings.toml "$STAGING/config/"
          cp examples/config/acl.toml "$STAGING/config/"
          cp examples/config/prompts.toml "$STAGING/config/"
          mkdir -p dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            ARCHIVE_NAME="dist/${{ env.PROJECT_NAME }}-v${VERSION}-${PLATFORM}.zip"
            powershell -Command "Compress-Archive -Path 'staging/*' -DestinationPath '${ARCHIVE_NAME}'"
          else
            ARCHIVE_NAME="dist/${{ env.PROJECT_NAME }}-v${VERSION}-${PLATFORM}.tar.gz"
            tar czf "$ARCHIVE_NAME" -C staging .
          fi
          echo "Artifact prepared: $ARCHIVE_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: dist/*

  changelog:
    name: Generate changelog
    needs: meta
    if: needs.meta.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md

  docker:
    name: Build and Push Docker Image
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: artifacts-linux-amd64
          path: ./docker-artifact

      - name: Prepare binary for Docker
        shell: bash
        run: |
          ARTIFACT_PATH=$(find ./docker-artifact -name "TeamSpeakClaw-*" -type f)
          tar -xzf "$ARTIFACT_PATH" -C ./docker-artifact
          cp ./docker-artifact/teamspeakclaw ./teamspeakclaw
          cp -r ./docker-artifact/config ./config-docker
          chmod +x ./teamspeakclaw

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/teamspeakclaw
          tags: |
            type=raw,value=latest,enable=${{ needs.meta.outputs.is-stable-release }}
            type=semver,pattern={{version}},enable=${{ needs.meta.outputs.is-release }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.meta.outputs.is-release }}
            type=sha,prefix=sha-,enable=${{ !needs.meta.outputs.is-release }}
            type=raw,value=dev,enable=${{ !needs.meta.outputs.is-release && github.event_name == 'push' }}

      - name: Build and push Docker image
        if: steps.meta.outputs.tags != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    if: needs.meta.outputs.is-release == 'true'
    needs: [meta, build, changelog, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Release ${{ needs.meta.outputs.tag }}
          body: |
            ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is-prerelease == 'true' }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
