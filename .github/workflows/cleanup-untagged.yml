name: Cleanup Untagged Images

on:
  workflow_dispatch:

jobs:
  clean-untagged:
    name: Delete untagged GHCR images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Clean up untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: teamspeakclaw
          delete-untagged: true
          # 首次运行取消先预览将要删除的内容
          dry-run: true
