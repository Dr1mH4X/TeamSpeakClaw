name: Cleanup Untagged Images

on:
  workflow_dispatch:

jobs:
  clean-untagged:
    name: Delete untagged GHCR images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Cleanup untagged images
        uses: snok/container-retention-policy@v2
        with:
          image-names: teamspeakclaw
          cut-off: 1s
          untagged: true
          # 预览将要删除的内容
          dry-run: true
