name: Cleanup Untagged Images

on:
  workflow_dispatch: # 仅允许手动触发

jobs:
  clean-untagged:
    name: Delete untagged GHCR images
    runs-on: ubuntu-latest
    permissions:
      packages: write # 删除镜像所需权限
      contents: read

    steps:
      - name: Delete untagged images via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: teamspeakclaw
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "Fetching package versions for $PACKAGE_NAME owned by $OWNER..."

          # 自动判断是个人账号还是组织：
          # 先尝试用 /users/ 路径，如果失败（非零退出码），则尝试用 /orgs/ 路径
          gh api -H "Accept: application/vnd.github+json" \
            "/users/$OWNER/packages/container/$PACKAGE_NAME/versions?per_page=100" \
            --jq '.[] | {id: .id, tags: .metadata.container.tags}' > versions.json || \
          gh api -H "Accept: application/vnd.github+json" \
            "/orgs/$OWNER/packages/container/$PACKAGE_NAME/versions?per_page=100" \
            --jq '.[] | {id: .id, tags: .metadata.container.tags}' > versions.json

          # 遍历每个版本
          jq -c '.' versions.json | while read -r version; do
            id=$(echo "$version" | jq -r '.id')
            tags=$(echo "$version" | jq -r '.tags | map(select(. != null)) | join(", ")')

            # 如果 tags 为空，说明是 untagged 镜像
            if [ -z "$tags" ] || [ "$tags" == "null" ]; then
              echo "Deleting untagged image version ID: $id"

              # 同样需要适配个人和组织的删除 API
              gh api --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "/users/$OWNER/packages/container/$PACKAGE_NAME/versions/$id" || \
              gh api --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "/orgs/$OWNER/packages/container/$PACKAGE_NAME/versions/$id"

              echo "Deleted successfully."
            else
              echo "Skipping version ID: $id (Tags: $tags)"
            fi
          done

          echo "Cleanup finished."
