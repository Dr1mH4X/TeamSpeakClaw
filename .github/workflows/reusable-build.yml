name: reusable-build

env:
  BIN_NAME: teamspeakclaw
  PROJECT_NAME: TeamSpeakClaw
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      is-release:
        type: boolean
        required: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_suffix: ".exe"
          - platform: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_suffix: ""
          - platform: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin_suffix: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version in Cargo.toml
        if: inputs.is-release == true
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          else
            sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libopus-dev

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          STAGING="staging"
          mkdir -p "$STAGING/config"
          SRC="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.bin_suffix }}"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$STAGING/"
          else
            echo "Error: Binary not found at $SRC"
            exit 1
          fi
          cp examples/config/settings.toml "$STAGING/config/"
          cp examples/config/acl.toml "$STAGING/config/"
          cp examples/config/prompts.toml "$STAGING/config/"
          mkdir -p dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            ARCHIVE_NAME="dist/${{ env.PROJECT_NAME }}-v${VERSION}-${PLATFORM}.zip"
            powershell -Command "Compress-Archive -Path 'staging/*' -DestinationPath '${ARCHIVE_NAME}'"
          else
            ARCHIVE_NAME="dist/${{ env.PROJECT_NAME }}-v${VERSION}-${PLATFORM}.tar.gz"
            tar czf "$ARCHIVE_NAME" -C staging .
          fi
          echo "Artifact prepared: $ARCHIVE_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: dist/*
