[teamspeak]
host = "127.0.0.1"
port = 10011
ssh_port = 10022
use_ssh = false
login_name = "serveradmin"
login_pass = ""           # 通过环境变量 TS_LOGIN_PASS 覆盖
server_id = 1
bot_nickname = "TSClaw"
keepalive_interval_secs = 180
reconnect_max_retries = 10
reconnect_base_delay_ms = 1000

[llm]
provider = "openai"       # 可选: openai | anthropic | ollama
api_key = ""              # 通过环境变量 LLM_API_KEY 覆盖
base_url = "https://api.openai.com/v1"
model = "gpt-4o"
max_tokens = 1024
timeout_secs = 30
retry_max = 3
retry_delay_ms = 500

[bot]
# 在频道/服务器聊天中触发机器人的前缀
trigger_prefixes = ["!tsclaw", "!bot", "@TSClaw"]
# 私聊消息始终触发机器人
respond_to_private = true
# 最大并发 LLM 请求数
max_concurrent_requests = 4

[rate_limit]
# 每个用户的令牌桶限流设置
requests_per_minute = 10
burst_size = 3

[audit]
enabled = true
log_dir = "./logs"
log_file = "audit.jsonl"

[cache]
# 客户端列表刷新间隔（秒）
refresh_interval_secs = 30
# 客户端离开后其缓存条目的存活时间（TTL）
entry_ttl_secs = 300
