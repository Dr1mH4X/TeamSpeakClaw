# TeamSpeakClaw ACL（访问控制列表）配置
# 复制此文件到 config/acl.toml 并根据需要修改规则
#
# 规则匹配逻辑：
#   1. server_group_ids 和 channel_group_ids 需要「同时匹配」才算匹配
#   2. 若某一侧数组为空（[]），表示对该侧不做限制，等价于"匹配所有该侧的用户"
#   3. 当用户同时命中多条规则时，allowed_skills 会从所有匹配规则中合并（取并集）
#   4. 如果任一匹配规则包含 "*"，则允许所有技能
#
# NapCat 虚拟组 ID 映射：
#   - 9000: 任意 NapCat 用户
#   - 9001: NapCat 群聊上下文
#   - 9002: trusted_users 中的用户
#   - 9003: trusted_groups 中群成员
#
# 可用技能名称：
#   - poke_client: 戳一戳用户
#   - send_message: 发送消息（跨平台路由）
#   - kick_client: 踢出用户
#   - ban_client: 封禁用户
#   - move_client: 移动用户到指定频道
#   - get_client_list: 获取在线用户列表
#   - get_client_info: 获取用户详细信息
#   - music_control: 音乐控制

[[rules]]
name = "superadmin"
server_group_ids = [6]    # 服务器管理员组 ID 通常是 6
channel_group_ids = []
allowed_skills = ["*"]
can_target_admins = true
rate_limit_override = 60

[[rules]]
name = "channel_admin"
server_group_ids = []
channel_group_ids = [5]   # 频道管理员组 ID
allowed_skills = [
  "poke_client",
  "send_message",
  "get_client_info",
  "get_client_list",
  "music_control",
  "kick_client"
]
can_target_admins = false
rate_limit_override = 20

[[rules]]
name = "default_user"
server_group_ids = [8]    # 普通用户组 ID
channel_group_ids = []
allowed_skills = [
  "poke_client",
  "send_message",
  "get_client_info",
  "get_client_list",
  "music_control"
]
can_target_admins = false
rate_limit_override = 20

# NapCat 映射规则（可按需启用）
[[rules]]
name = "napcat_default"
server_group_ids = [9000]  # 任意 NapCat 用户
channel_group_ids = []
allowed_skills = [
  "send_message",
  "get_client_info",
  "get_client_list",
  "music_control"
]
can_target_admins = false
rate_limit_override = 20

# 默认规则 (匹配所有人)
[[rules]]
name = "default"
server_group_ids = []
channel_group_ids = []
allowed_skills = ["music_control"]
can_target_admins = false

# 受保护的组 ID，can_target_admins = false 的用户不能对这些组的成员执行踢出/封禁等操作
[acl]
protected_group_ids = [6, 8, 9]
