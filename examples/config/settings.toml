# TeamSpeakClaw Configuration
# Copy this file to config/settings.toml and modify the values below

# Bot 配置
[bot]
nickname = "TSClaw"                       # 机器人名称（ServerQuery 会自动追加随机后缀）
trigger_prefixes = ["!tsclaw", "!bot", "@TSClaw"]       # 在频道/服务器聊天中触发机器人的前缀
respond_to_private = true       # 私聊消息始终触发机器人
default_reply_mode = "channel"  # 默认回复模式: "private"(私聊) | "channel"(频道) | "server"(服务器广播)

# Headless 语音服务配置
[headless]
enabled = false
ts3_host = "127.0.0.1"
ts3_port = 9987
server_password = ""
channel_password = ""
channel_path = ""
channel_id = ""

[headless.stt]
enabled = false
provider = "openai-compatibility"
base_url = "http://stt-api:9000/inference"  # 本地 whisper.cpp 服务（Docker Compose 部署）
# base_url = ""  # OpenAI 兼容的在线 STT 服务地址
api_key = ""  # 本地服务无需 API Key，在线服务需填写
model = "ggml-large-v3-turbo"  # whisper 模型名称（本地）/ 在线服务的模型名称
language = "zh"  # 语言代码：zh(中文), en(英语), ja(日语), ko(韩语) 等
wake_words = ["tsclaw"]
wake_word_required = false

[headless.tts]
enabled = false
provider = "openai-compatibility"
base_url = ""
api_key = ""
model = "gpt-4o-mini-tts"
voice = "alloy"

# ServerQuery 配置
[serverquery]
host = "127.0.0.1"
port = 10011
ssh_port = 10022
method = "tcp"            # 连接方式: tcp 或 ssh
login_name = "serveradmin"
login_pass = ""
server_id = 1

# LLM 配置
[llm]
api_key = ""
base_url = "https://api.openai.com/v1"
model = "gpt-4o"
stream_output = false  # 流式输出：false 或 true（TTS快速响应）
omni_model = false    # 全模态模型：true 时自动禁用 TTS/STT，直接使用语音输入输出
max_context_turns = 0  # 最大上下文对话轮数（0 表示禁用上下文）
max_context_sessions = 3  # 最大会话数（超过时淘汰最旧会话）
max_concurrent_requests = 4     # 最大并发 LLM 请求数
max_tool_turns = 3              # 最大工具调用轮数（支持多轮工具调用）

# 限流配置
[rate_limit]
requests_per_minute = 10        # 每个用户的令牌桶限流设置
burst_size = 3

# 日志配置
[logging]
file_level = "info"

# 联动项目配置
# 音乐后端配置
[music_backend]
backend = "ts3audiobot"  # "ts3audiobot"（通过 TS 私信控制）或 "tsbot_backend"（NeteaseTSBot）或 "ncm_api"（内置播放）
base_url = "http://127.0.0.1:8009"   # backend = "tsbot_backend" 时生效
musicbot_name = "ts3audiobot"  # 音乐机器人名称，其音频不会被送入 STT

# NCM API 专属配置（backend = "ncm_api" 时生效）
[music_ncm_api]
ncm_cookie = ""  # 可选，填 MUSIC_U=xxx 以播放 VIP 歌曲

# UNM 配置（可选，解锁灰色歌曲）
unm_enabled = true
unm_sources = "ytdl,bilibili,kugou"    # 音源，逗号分隔（ytdl=yt-dlp, bilibili, kugou, kuwo, qq, joox, pyncm）
unm_enable_flac = false                  # 启用无损音质
unm_search_mode = "fast-first"           # fast-first（速度优先）或 order-first（顺序优先）
unm_proxy_uri = ""                       # 代理地址（如 https://proxy.example.com）
unm_joox_cookie = ""                     # JOOX cookie（需要时填写）
unm_qq_cookie = ""                       # QQ cookie（需要时填写）

# NapCat 配置（可选，用于 QQ 机器人功能）
# 前置要求：安装并运行 NapCat（https://napneko.github.io/）
[napcat]
enabled = false                           # 是否启用 NapCat 适配器
ws_url = "ws://127.0.0.1:3001"           # NapCat WebSocket 服务地址
access_token = ""                         # 访问令牌（若 NapCat 配置了鉴权则填写）
listen_groups = []                        # 监听的群 ID 列表，空列表表示监听所有群
trigger_prefixes = ["!claw", "!bot"]      # 群聊触发前缀（私聊无需前缀）
trusted_groups = []                       # 信任的群 ID 列表，群内所有成员可使用机器人
trusted_users = []                        # 信任的用户 QQ 号列表，私聊和群聊均可使用
