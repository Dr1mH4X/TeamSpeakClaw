# TeamSpeakClaw Configuration
# Copy this file to config/settings.toml and modify the values below

# Bot 配置
[bot]
nickname = "TSClaw"                       # 机器人名称
trigger_prefixes = ["!tsclaw", "!bot", "@TSClaw"]       # 在频道/服务器聊天中触发机器人的前缀
respond_to_private = true       # 私聊消息始终触发机器人
default_reply_mode = "channel"  # 默认回复模式: "private"(私聊) | "channel"(频道) | "server"(服务器广播)

# LLM 配置
[llm]
api_key = ""
base_url = "https://api.openai.com/v1"
model = "gpt-4o"
omni_model = false    # 多模态模型：true 时自动禁用 TTS/STT，直接使用语音输入输出
max_context_turns = 3  # 最大上下文对话轮数（0 表示禁用上下文）
max_context_sessions = 3  # 最大不同用户会话数（超过时淘汰最旧会话）

# Headless 语音服务配置
[headless]
server_address = "127.0.0.1"
server_port = 9987
server_password = ""
channel_password = ""
channel_id = ""

[headless.stt]
enabled = false
provider = "openai-compatibility"
base_url = "http://stt-api:9000/inference"  # 本地 whisper.cpp 服务（Docker Compose 部署） / OpenAI 兼容的在线 STT 服务地址
api_key = ""  # 本地服务无需 API Key，在线服务需填写
model = "ggml-large-v3-turbo"  # whisper 模型名称（本地）/ 在线服务的模型名称
language = "zh"  # 语言代码：zh(中文), en(英语), ja(日语), ko(韩语) 等
wake_words = ["tsclaw"]
wake_word_required = false

[headless.tts]
enabled = false
provider = "openai-compatibility"
base_url = ""
api_key = ""
model = "gpt-4o-mini-tts"
voice = "alloy"

# 日志配置
[logging]
file_level = "info"
max_log_days = 7  # 日志保留天数，超出自动删除

# 联动项目配置
# 音乐后端配置
[music_backend]
backend = "ts3audiobot"  # "ts3audiobot"（TS3AudioBot插件 私信控制）| "tsmusicbot"（TSMusicBot 私信控制）| "tsbot_backend"（NeteaseTSBot HTTP API）
base_url = "http://127.0.0.1:8009"   # backend = "tsbot_backend" 时生效
musicbot_name = "TS3AudioBot"  # 音乐机器人名称，其音频不会被送入 STT

# NapCat 配置（可选，用于 QQ 机器人功能）
# 前置要求：安装并运行 NapCat（https://napneko.github.io/）
[napcat]
enabled = false                           # 是否启用 NapCat 适配器
ws_url = "ws://127.0.0.1:3001"           # NapCat WebSocket 服务地址
access_token = ""                         # 访问令牌（若 NapCat 配置了鉴权则填写）
listen_groups = []                        # 监听的群 ID 列表，空列表表示监听所有群
trigger_prefixes = ["!claw", "!bot"]      # 群聊触发前缀（私聊无需前缀）
trusted_groups = []                       # 信任的群 ID 列表，群内所有成员可使用机器人
trusted_users = []                        # 信任的用户 QQ 号列表，私聊和群聊均可使用
