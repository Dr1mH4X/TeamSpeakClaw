version: "3.8"

services:
  teamspeakclaw:
    image: ghcr.io/dr1mh4x/teamspeakclaw:latest
    container_name: teamspeakclaw
    user: "1000:10" #PUID:GUID
    restart: unless-stopped
    volumes:
      # 配置文件目录（必须）
      - ./config:/app/config
      # 日志目录
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
    networks:
      - openteamspeak
    depends_on:
      - stt-api

  stt-api:
    image: ghcr.io/ggml-org/whisper.cpp:main-vulkan
    container_name: whisper-stt-api
    restart: unless-stopped
    volumes:
      # whisper 模型目录（只读）
      - ./models:/models:ro
    environment:
      - TZ=Asia/Shanghai
    devices:
      # Intel/AMD GPU 加速（可选，无 GPU 可删除此行）
      - /dev/dri
    entrypoint: ""
    command: >
      whisper-server
      --host 0.0.0.0
      --port 9000
      -m /models/ggml-large-v3-turbo.bin
    networks:
      - openteamspeak

networks:
  openteamspeak:
    driver: bridge